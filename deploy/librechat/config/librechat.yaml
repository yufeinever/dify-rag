version: 1.2.1
cache: true

interface:
  modelSelect: false
  privacyPolicy:
    externalUrl: ''
    openNewTab: false
  termsOfService:
    externalUrl: ''
    openNewTab: false

registration:
  socialLogins: []

endpoints:
  agents:
    disableBuilder: false
    allowedProviders:
      - '企业模型'
  custom:
    - name: '企业模型'
      apiKey: '${CUSTOM_OPENAI_API_KEY}'
      baseURL: '${CUSTOM_OPENAI_BASE_URL}'
      models:
        default:
          - 'gpt-5.5'
          - 'gpt-5.2'
        fetch: false
      titleConvo: true
      titleModel: 'gpt-5.5'
      summarize: false
      modelDisplayLabel: '企业模型'
      dropParams:
        - 'stop'

modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: 'gpt-5.5'
      label: 'gpt-5.5'
      description: '企业直连基础模型'
      default: true
      preset:
        endpoint: '企业模型'
        model: 'gpt-5.5'
    - name: 'deepseek-v4-flash'
      label: 'deepseek v4 flash'
      description: 'DeepSeek 模型，底层调用 gpt-5.2'
      preset:
        endpoint: '企业模型'
        model: 'gpt-5.2'
