name: dify-librechat-poc

services:
  api:
    image: registry.librechat.ai/danny-avila/librechat-dev-api:latest
    container_name: librechat-api
    restart: unless-stopped
    depends_on:
      - mongodb
      - meilisearch
      - rag_api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/LibreChat
      MEILI_HOST: http://meilisearch:7700
      RAG_PORT: ${RAG_PORT:-8000}
      RAG_API_URL: http://rag_api:${RAG_PORT:-8000}
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/api/logs
      - ./skill:/app/skill

  client:
    image: nginx:1.27.0-alpine
    container_name: librechat-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${LIBRECHAT_PORT:-3090}:80"
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mongodb:
    image: mongo:8.0.20
    container_name: librechat-mongodb
    restart: unless-stopped
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth

  meilisearch:
    image: getmeili/meilisearch:v1.35.1
    container_name: librechat-meilisearch
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MEILI_HOST: http://meilisearch:7700
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ./meili_data_v1.35.1:/meili_data

  vectordb:
    image: pgvector/pgvector:0.8.0-pg15-trixie
    container_name: librechat-vectordb
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - librechat-pgdata:/var/lib/postgresql/data

  rag_api:
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    container_name: librechat-rag-api
    restart: unless-stopped
    depends_on:
      - vectordb
    env_file:
      - .env
    environment:
      DB_HOST: vectordb
      RAG_PORT: ${RAG_PORT:-8000}

volumes:
  librechat-pgdata:
