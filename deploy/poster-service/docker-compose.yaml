services:
  poster-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: mmbai/poster-service:local
    env_file:
      - path: .env
        required: false
    environment:
      POSTER_OUTPUT_DIR: /app/output
    ports:
      - "${POSTER_SERVICE_PORT:-8088}:8088"
    volumes:
      - ./output:/app/output
    restart: unless-stopped
