identity:
  name: bind-image-asset
  author: mmb
  label:
    en_US: Image Asset Binder
    zh_Hans: 原图资产绑定
description:
  human:
    en_US: Bind original uploaded image metadata and stable preview path to caption text.
    zh_Hans: 将原始上传图片元数据和稳定预览路径绑定到 Caption 文本。
  llm: Merge image caption text with original upload file metadata for RAG image retrieval.
parameters:
- name: file
  type: file
  required: true
  label:
    en_US: Original Image File
    zh_Hans: 原始图片文件
  human_description:
    en_US: The original uploaded png/jpg/jpeg file.
    zh_Hans: 原始上传的 png/jpg/jpeg 图片。
  form: llm
- name: caption_text
  type: string
  required: true
  label:
    en_US: Caption Text
    zh_Hans: Caption 文本
  human_description:
    en_US: Text generated by the image caption parser.
    zh_Hans: 图片 Caption 解析器生成的文本。
  llm_description: Caption text generated by upstream vision parser.
  form: llm
- name: upload_file_id
  type: string
  required: false
  label:
    en_US: Upload File ID
    zh_Hans: 原始上传文件 ID
  human_description:
    en_US: Optional original Dify upload file ID from datasource node.
    zh_Hans: 来自数据源节点的可选 Dify 原始上传文件 ID。
  llm_description: Optional original Dify upload file id for stable preview path binding.
  form: llm
- name: preprocess_metadata
  type: string
  required: false
  label:
    en_US: Preprocess Metadata
    zh_Hans: 图片预处理元数据
  human_description:
    en_US: Optional metadata from image preprocess tool.
    zh_Hans: 图片预处理工具输出的可选元数据。
  llm_description: Optional JSON metadata from image preprocessing.
  form: llm
output_schema:
  type: object
  properties:
    text:
      type: string
      description: Caption text plus original image asset binding section.
    asset_binding:
      type: object
      description: Original image file metadata and stable preview path.
    asset_binding_report:
      type: object
      description: Binding status and warnings.
extra:
  python:
    source: tools/bind_image_asset.py
